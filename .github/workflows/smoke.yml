name: Smoke (full chain)

# Drive the committed local MCP runtime through the whole deterministic chain —
# capture -> govern -> audit-verify -> search — hermetically and with ZERO LLM
# egress, against the pinned stack in gsb.lock.json.
#
# This tests the SHIPPED artifact (plugin-runtime/governed-brain.cjs, which
# inlines the private INTKB packages), so the build is intentionally NOT run here
# — it needs the sibling qmd-team-intent-kb monorepo that only exists locally.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Full-chain smoke (zero egress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lockfile drift guard (gsb.lock.json vs the manifests)
        run: node smoke/check-lock.mjs

      # The committed bundle inlines INTKB, so CI never builds — and the build-only
      # devDeps are `link:../qmd-team-intent-kb/*`, which don't exist here. Strip
      # them, then install just the prod deps (the MCP SDK for the smoke client +
      # better-sqlite3, the bundle's one external native dep).
      - name: Install runtime deps for the committed bundle
        run: |
          node -e "const p=require('./package.json'); delete p.devDependencies; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"
          npm install --no-audit --no-fund

      - name: Install pinned qmd (best-effort — enables the search assertion)
        continue-on-error: true
        run: npm install -g @tobilu/qmd@2.5.3

      - name: Smoke — capture -> govern -> audit-verify -> search
        run: node smoke/smoke.mjs

      # B1 (auto-govern the remote brain_capture inbox): seed remote-shape
      # candidates directly in the throwaway `candidates` table, then drive the
      # sweep — proves promote/quarantine/duplicate/keep-in-inbox + idempotency.
      - name: Smoke — B1 auto-govern inbox sweep (quarantine + idempotency)
        run: node smoke/b1-inbox-sweep.mjs

      # Onboarding: the src/index.ts mode-dispatch + fail-closed wiring, driven END-TO-END
      # through the committed bundle (team.json → env fill → local/team; loose-perms &
      # snake_case → loud refusal). Zero egress — team mode opens no socket at boot.
      - name: Smoke — mode dispatch + fail-closed (team.json fallback)
        run: node --test smoke/mode-dispatch.test.mjs
