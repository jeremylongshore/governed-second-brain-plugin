name: Release

# Publish governed-second-brain to npm WITH provenance (signed, OIDC-attested
# build → package linkage). Triggers on a v* tag, or manual dispatch.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance (Sigstore/OIDC)

jobs:
  publish:
    name: Publish to npm (provenance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # The runtime bundle (plugin-runtime/governed-brain.cjs) is committed, so
      # there is nothing to build here — the workflow only attests + publishes.
      # Guard: the committed package.json version must match the v* tag.
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $TAG != package.json $PKG"; exit 1
          fi

      - name: Publish (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
